name: mxonlive
description: mxonlive - Premium Free IPTV Live TV Streaming Platform. No Ads, No Tracking, No Payment.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.1
  
  # State Management
  provider: ^6.0.5
  
  # Storage & Caching
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.0
  
  # Video Player
  video_player: ^2.7.0
  
  # UI & Animation
  flutter_spinkit: ^5.2.0
  
  # URL Launcher
  url_launcher: ^6.1.10
  
  # Localization
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/
